<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAF Base Kano Accommodation System</title>

<!-- ================= CSS ================= -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BODY */
body {
    background: #0a1f44;
    color: #fff;
}

/* HEADER */
header {
    background: #061733;
    text-align: center;
    padding: 15px;
}

/* MAIN */
.main-container {
    text-align: center;
    padding: 20px;
}

/* SLIDER */
.slider {
    margin-bottom: 20px;
}

.slide {
    display: none;
}

.slide.active {
    display: block;
}

.slide img {
    width: 90%;
    max-height: 300px;
    object-fit: cover;
    border-radius: 10px;
}

.caption {
    margin-top: 10px;
}

/* BUTTONS */
.buttons button {
    margin: 10px;
    padding: 12px 20px;
    background: #1e4fa1;
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
}

.buttons button:hover {
    background: #2f6be0;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: #fff;
    color: #000;
    margin: 10% auto;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

.modal input, .modal select {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
}

.modal button {
    width: 100%;
    padding: 10px;
    background: #0a1f44;
    color: #fff;
    border: none;
}

.close {
    float: right;
    cursor: pointer;
}

/* PASSWORD TOGGLE */
.input-group {
    position: relative;
}

.toggle-password {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 10px;
    background: #061733;
}
</style>
</head>

<body>

<header>
    <h1>NAF Base Kano Accommodation System</h1>
</header>

<main class="main-container">

<!-- SLIDER -->
<section class="slider">
    <div class="slide active">
        <img src="{{ url_for('static', filename='images/bsg.jpg') }}">
        <p>Base Services Group (BSG)</p>
    </div>

    <div class="slide">
        <img src="{{ url_for('static', filename='images/officers.jpg') }}">
        <p>Officers Accommodation</p>
    </div>

    <div class="slide">
        <img src="{{ url_for('static', filename='images/airmen.jpg') }}">
        <p>Airmen / Other Ranks</p>
    </div>
</section>

<!-- ACTION BUTTONS -->
<section>
    <h2>Welcome</h2>

    <div class="buttons">
        <button onclick="openModal('loginModal')">Personnel Login</button>
        <button onclick="openModal('registerModal')">Register</button>
        <button onclick="openModal('adminModal')">Admin Login</button>
    </div>
</section>

</main>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('loginModal')">&times;</span>

<h2>Personnel Login</h2>

<form id="loginForm">
<input type="text" id="login_service_number" placeholder="Service Number" required>

<div class="input-group">
<input type="password" id="login_password" placeholder="Password" required>
<span class="toggle-password">👁</span>
</div>

<button type="submit">Login</button>
</form>

</div>
</div>

<!-- REGISTER MODAL -->
<div id="registerModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('registerModal')">&times;</span>

<h2>Register</h2>

<form id="registerForm">
<input type="text" id="full_name" placeholder="Full Name" required>
<input type="text" id="service_number" placeholder="Service Number" required>
<input type="email" id="email" placeholder="Email" required>

<select id="rank" required>
<option value="">Select Rank</option>
<option value="Officer">Officer</option>
<option value="Other Rank">Other Rank</option>
</select>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<span class="toggle-password">👁</span>
</div>

<button type="submit">Register</button>
</form>

</div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('adminModal')">&times;</span>

<h2>Admin Login</h2>

<form id="adminForm">
<input type="text" id="admin_username" placeholder="Username" required>

<div class="input-group">
<input type="password" id="admin_password" placeholder="Password" required>
<span class="toggle-password">👁</span>
</div>

<button type="submit">Login</button>
</form>

</div>
</div>

<footer>
<p>&copy; 2026 NAF Base Kano</p>
</footer>

<!-- ================= JS ================= -->
<script>

// MODALS
function openModal(id) {
    document.getElementById(id).style.display = "block";
}
function closeModal(id) {
    document.getElementById(id).style.display = "none";
}

// PASSWORD TOGGLE
document.querySelectorAll(".toggle-password").forEach(t => {
    t.addEventListener("click", function() {
        let input = this.previousElementSibling;
        input.type = input.type === "password" ? "text" : "password";
    });
});

// REGISTER
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            fullname: document.getElementById("full_name").value,
            service_number: document.getElementById("service_number").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            rank: document.getElementById("rank").value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message || data.error));
});

// LOGIN
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            service_number: document.getElementById("login_service_number").value,
            password: document.getElementById("login_password").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.message) window.location.href="/dashboard";
        else alert(data.error);
    });
});

// ADMIN LOGIN
document.getElementById("adminForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/admin/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("admin_username").value,
            password: document.getElementById("admin_password").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.role === "AO") {
            window.location.href = "/ao";
        }
        else if (data.role === "Commander") {
            window.location.href = "/commander";
        }
        else if (data.role === "OC Works") {
            window.location.href = "/oc";
        }
        else if (data.role === "Supervisor") {
            window.location.href = "/supervisor";
        }
        else {
            alert(data.error);
        }
    });
}); 

// SIMPLE SLIDER
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

</script>

</body>
</html>
