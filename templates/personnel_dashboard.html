<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personnel Dashboard</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body {background:#0a1f44;}
header {background:#061733;color:#fff;padding:15px;text-align:center;}
.container {display:flex;min-height:100vh;}
.sidebar {width:250px;background:#061733;color:#fff;padding:20px;}
.sidebar li {padding:12px;margin-bottom:10px;background:#0a1f44;cursor:pointer;border-radius:5px;}
.sidebar li:hover {background:#1e4fa1;}
.content {flex:1;padding:20px;background:#f5f7fa;}
.cards {display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
.card {background:#fff;padding:15px;border-radius:8px;}
.card button {margin-top:10px;width:100%;padding:10px;background:#0a1f44;color:#fff;border:none;cursor:pointer;}
form input,form select,textarea {width:100%;padding:10px;margin:8px 0;}
button {padding:10px;}
</style>
</head>

<body>

<header><h1>Personnel Dashboard</h1></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<ul>
<li onclick="showSection('home')">Dashboard</li>
<li onclick="showSection('apply')">Apply</li>
<li onclick="showSection('allocation')">Allocation</li>
<li onclick="showSection('check')">Check-in/out</li>
<li onclick="showSection('complaint')">Complaint</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<!-- MAIN -->
<div class="content">

<!-- HOME -->
<div id="home" class="section">
<h2>Welcome</h2>
<div class="cards">
<div class="card"><h3>Apply</h3><button onclick="showSection('apply')">Apply</button></div>
<div class="card"><h3>Allocation</h3><button onclick="showSection('allocation')">View</button></div>
<div class="card"><h3>Check-in/out</h3><button onclick="showSection('check')">Proceed</button></div>
<div class="card"><h3>Complaint</h3><button onclick="showSection('complaint')">Submit</button></div>
</div>
</div>

<!-- APPLY -->
<div id="apply" class="section" style="display:none;">
<h2>Apply</h2>
<form id="applyForm">
<select id="type" required>
<option value="">Select Type</option>
<option value="Officer">Officers Quarters</option>
<option value="Other Rank">Other Ranks</option>
</select>
<button type="submit">Submit</button>
</form>
<p id="applicationStatusBox"></p>
</div>

<!-- ALLOCATION -->
<div id="allocation" class="section" style="display:none;">
<h2>My Allocation</h2>
<div id="allocationBox">Loading...</div>
</div>

<!-- CHECK -->
<div id="check" class="section" style="display:none;">
<h2>Check-in / Check-out</h2>
<button onclick="checkIn()">Check-in</button>
<button onclick="checkOut()">Check-out</button>
</div>

<!-- COMPLAINT -->
<div id="complaint" class="section" style="display:none;">

    <h2>Submit Complaint</h2>

    <form id="complaintForm">
        <textarea 
            id="message" 
            placeholder="Enter your complaint..." 
            required
            style="width:100%; height:120px; padding:10px;">
        </textarea>

        <br><br>

        <button type="submit">
            Submit Complaint
        </button>
    </form>

</div>
<script>

/* SWITCH */
function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="block";
}

/* LOGOUT */
function logout(){
    window.location.href="/logout";
}

/* SAFE FETCH (STANDARDIZED) */
async function safeFetch(url, options={}){
    try{
        const res = await fetch(url, options);
        const data = await res.json();

        if(!res.ok){
            alert(data.error || "Error");
            throw new Error(data.error);
        }

        return data;
    }catch(err){
        console.error(err);
        alert("Network or server error");
    }
}

/* APPLY FORM */
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("applyForm");

    if (form){
        form.addEventListener("submit", async function(e){
            e.preventDefault();

            const type = document.getElementById("type").value;

            if (!type){
                alert("Select accommodation type");
                return;
            }

            const data = await safeFetch("/personnel/apply", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({type: type})
            });

            if(!data) return;

            alert(data.message);

            // 🔥 refresh BOTH
            loadApplicationStatus();
            loadAllocation();
        });
    }

});

/* COMPLAINT FORM (SAFE) */
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("complaintForm");

    if (!form) return;

    form.addEventListener("submit", function(e){
        e.preventDefault();

        const message = document.getElementById("message").value;

        if (!message){
            alert("Enter your complaint");
            return;
        }

        fetch("/personnel/complain", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({message: message})
        })
        .then(res => res.json())
        .then(data => {
            if (data.error){
                alert(data.error);
                return;
            }

            alert(data.message);
            form.reset();
        })
        .catch(() => alert("Network error"));
    });

});

/* STATUS */
function loadApplicationStatus(){
    fetch("/personnel/application-status")
    .then(res=>res.json())
    .then(data=>{
        const box=document.getElementById("applicationStatusBox");

        if(!box) return;

        if(data.status === "pending"){
            box.innerHTML = "Application Pending...";
        }
        else if(data.status === "assigned"){
            box.innerHTML = "Accommodation Assigned (Check Allocation Tab)";
        }
        else if(data.status === "rejected"){
            box.innerHTML = "Application Rejected";
        }
        else{
            box.innerHTML = "No application";
        }
    })
    .catch(()=>console.error("Status load failed"));
}

/* ALLOCATION (IMPROVED) */
function loadAllocation() {
    fetch("/personnel/allocation")
    .then(res => res.json())
    .then(data => {
        const box = document.getElementById("allocationBox");

        if (!box) return;

        if (data.message) {
            box.innerHTML = "<p>No accommodation assigned yet</p>";
            return;
        }

        box.innerHTML = `
            <h3>Your Accommodation</h3>
            <p><b>Block:</b> ${data.block}</p>
            <p><b>Flat:</b> ${data.flat}</p>
        `;
    })
    .catch(() => {
        const box = document.getElementById("allocationBox");
        if(box){
            box.innerHTML = "<p>Error loading allocation</p>";
        }
    });
}

/* AUTO LOAD WHEN TAB OPENED */
document.addEventListener("DOMContentLoaded", () => {

    const allocationTab = document.querySelector("li[onclick*='allocation']");

    if (allocationTab){
        allocationTab.addEventListener("click", function(){
            setTimeout(loadAllocation, 300);
        });
    }

});

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
    loadApplicationStatus();
    loadAllocation();
});
</script>

</body>
</html>
